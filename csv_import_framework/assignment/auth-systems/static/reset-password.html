<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Form AI Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["'Plus Jakarta Sans'", "sans-serif"],
            },
            colors: {
              ink: "#0f172a",
              brand: "#0f766e",
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="min-h-screen text-ink">
    <main class="mx-auto flex min-h-screen max-w-7xl items-center px-4 py-10 sm:px-6 lg:px-8">
      <section class="mx-auto grid w-full max-w-5xl gap-8 lg:grid-cols-[1fr_0.9fr]">
        <div class="glass-panel rounded-[2rem] border border-white/70 p-6 shadow-soft sm:p-8">
          <p class="text-sm font-semibold uppercase tracking-[0.2em] text-brand">Password Reset</p>
          <h1 class="mt-2 text-3xl font-bold">Choose a new password</h1>
          <p class="mt-3 text-sm leading-6 text-slate-600">
            Enter the password reset token from your email and set a new password.
          </p>

          <div id="resetMessage" class="mt-6 hidden"></div>

          <form id="resetForm" class="mt-6 space-y-5" novalidate>
            <div>
              <label for="resetToken" class="mb-2 block text-sm font-semibold text-slate-700">Reset token</label>
              <input id="resetToken" type="text" class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none transition focus:border-brand focus:ring-4 focus:ring-emerald-100" placeholder="Paste your token" required />
            </div>
            <div>
              <label for="newPassword" class="mb-2 block text-sm font-semibold text-slate-700">New password</label>
              <input id="newPassword" type="password" class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none transition focus:border-brand focus:ring-4 focus:ring-emerald-100" placeholder="Minimum 6 chars and 1 special character" required />
            </div>
            <button id="resetButton" type="submit" class="w-full rounded-2xl bg-ink px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">Reset Password</button>
          </form>

          <p class="mt-8 text-center text-sm text-slate-600">
            Back to
            <a href="/login" class="font-semibold text-brand transition hover:text-teal-700">login</a>
          </p>
        </div>

        <div class="rounded-[2rem] border border-emerald-100 bg-gradient-to-br from-emerald-50 via-white to-cyan-50 px-8 py-10 shadow-soft">
          <span class="inline-flex rounded-full border border-emerald-200 bg-white px-3 py-1 text-xs font-semibold uppercase tracking-[0.24em] text-emerald-700">Email Instructions</span>
          <h2 class="mt-6 text-4xl font-extrabold leading-tight">Your inbox now handles the recovery flow.</h2>
          <p class="mt-4 text-base leading-7 text-slate-600">
            Reset links are now delivered through SMTP email instead of being printed in the backend console.
          </p>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const tokenFromUrl = params.get("token");
      if (tokenFromUrl) {
        document.getElementById("resetToken").value = tokenFromUrl;
      }

      document.getElementById("resetForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        showMessage("resetMessage", "", "error");

        const token = document.getElementById("resetToken").value.trim();
        const password = document.getElementById("newPassword").value;

        if (!token) {
          showMessage("resetMessage", "Please enter the reset token.", "error");
          return;
        }

        if (!isStrongPassword(password)) {
          showMessage("resetMessage", "Password must be at least 6 characters and include one special character.", "error");
          return;
        }

        setLoading("resetButton", true, "Reset Password");
        try {
          const data = await apiRequest("/auth/reset-password", {
            method: "POST",
            body: JSON.stringify({ token, password }),
          });
          showMessage("resetMessage", data.message, "success");
          document.getElementById("resetForm").reset();
        } catch (error) {
          showMessage("resetMessage", error.message, "error");
        } finally {
          setLoading("resetButton", false, "Reset Password");
        }
      });
    </script>
  </body>
</html>
