version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: form_ai_auth_db
    environment:
      POSTGRES_DB: form_ai_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d form_ai_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
